version: "3.8"

services:
  # Database Service: PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: pravadhya-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: pravadhya_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Web Service: Next.js
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pravadhya-web-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/pravadhya_db?schema=public
      JWT_SECRET: LetoilePravadhyaSecretSessionToken643729
      PORT: 3000
    depends_on:
      - db

volumes:
  postgres_data:
